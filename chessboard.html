<!DOCTYPE html>
<html>
<head>
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes">
<title>Chessboard Calibration Target</title>
<style>
  * { margin:0; padding:0; box-sizing:border-box; }
  body { background:#fff; overflow-x:hidden; font-family:sans-serif; }
  #info {
    font-size:14px; color:#111; padding:8px 12px;
    text-align:center; background:#f5f5f5; border-bottom:1px solid #ddd;
    line-height:1.5;
  }
  #hint { font-size:11px; color:#888; margin-top:3px; }
  canvas {
    display:block;
    width:100vw;
    height:auto;
    image-rendering:crisp-edges;
    image-rendering:pixelated;
  }
</style>
</head>
<body>
<div id="info">
  Hold up to webcam — keep board fully visible<br>
  <span id="hint">Pinch to zoom if squares appear small</span>
</div>
<canvas id="board"></canvas>
<script>
  // Board config — must match calibrate.py constants
  var SQUARES_W = 9;   // CORNERS_W + 1
  var SQUARES_H = 7;   // CORNERS_H + 1

  var canvas    = document.getElementById('board');
  var ctx       = canvas.getContext('2d');

  var squarePx  = Math.floor(Math.min(window.screen.width / SQUARES_W,
                                       window.screen.height / SQUARES_H));
  canvas.width  = squarePx * SQUARES_W;
  canvas.height = squarePx * SQUARES_H;

  for (var row = 0; row < SQUARES_H; row++) {
    for (var col = 0; col < SQUARES_W; col++) {
      ctx.fillStyle = (row + col) % 2 === 0 ? '#ffffff' : '#000000';
      ctx.fillRect(col * squarePx, row * squarePx, squarePx, squarePx);
    }
  }
</script>
</body>
</html>
